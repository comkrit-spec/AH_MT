<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแสดงสถานะเครื่องจักร</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ตั้งค่าฟอนต์ภาษาไทย */
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ซ่อนส่วนอื่นเวลาสั่ง Print สติกเกอร์ QR Code */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { 
                position: absolute; left: 0; top: 0; width: 100%; height: 100%; 
                display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; 
            }
            .label-box { 
                border: 2px solid #000; padding: 20px; text-align: center; 
                width: 300px; border-radius: 10px; page-break-inside: avoid; 
            }
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- ================= Sidebar (เมนูด้านซ้าย) ================= -->
    <aside class="w-64 bg-white shadow-lg flex flex-col justify-between hidden md:flex h-full z-10">
        <div>
            <div class="h-20 flex items-center justify-center border-b border-gray-200">
                <h1 class="text-3xl font-bold text-blue-600 italic">M-MAINTAIN</h1>
            </div>
            <nav class="p-4 space-y-2">
                <button onclick="switchView('overview')" id="menu-overview" class="w-full text-left block px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium transition">
                    <i class="fas fa-th-large mr-2 w-5"></i> ภาพรวม
                </button>
                <button onclick="switchView('update')" id="menu-update" class="w-full text-left block px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium transition">
                    <i class="fas fa-tools mr-2 w-5"></i> แจ้งซ่อม / อัปเดต
                </button>
            </nav>
        </div>
        <div class="p-4 border-t border-gray-200">
            <div class="px-4 py-3 bg-gray-50 rounded-lg mb-3">
                <p class="text-sm text-gray-500">พนักงาน / ผู้ใช้งาน</p>
                <p class="font-semibold text-gray-800">Scan & Report</p>
            </div>
        </div>
    </aside>

    <!-- ================= Main Content ================= -->
    <main class="flex-1 flex flex-col h-full relative w-full">
        <!-- Header (สำหรับมือถือ) -->
        <header class="md:hidden bg-white shadow p-4 flex justify-between items-center z-10">
            <h1 class="text-xl font-bold text-blue-600 italic">M-MAINTAIN</h1>
            <div class="flex gap-2">
                <button onclick="switchView('overview')" class="text-gray-600 px-2 text-xl"><i class="fas fa-th-large"></i></button>
                <button onclick="switchView('update')" class="text-gray-600 px-2 text-xl"><i class="fas fa-tools"></i></button>
            </div>
        </header>

        <div class="p-4 md:p-6 overflow-y-auto flex-1 w-full relative">
            
            <!-- Loading State -->
            <div id="loading" class="absolute inset-0 bg-gray-100 bg-opacity-80 flex flex-col items-center justify-center z-20 hidden">
                <div class="loader mb-4"></div>
                <p class="text-gray-600 font-medium" id="loading-text">กำลังประมวลผล...</p>
            </div>

            <!-- ================= VIEW: ภาพรวม (Overview) ================= -->
            <div id="view-overview" class="view-section">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <h2 class="text-2xl font-bold text-gray-800">สถานะเครื่องจักร (ภาพรวม)</h2>
                    <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow flex items-center transition">
                        <i class="fas fa-sync-alt mr-2"></i> โหลดข้อมูลใหม่
                    </button>
                </div>
                <!-- พื้นที่แสดงการ์ดเครื่องจักร -->
                <div id="machine-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    <!-- การ์ดจะถูกสร้างที่นี่ด้วย JavaScript -->
                </div>
            </div>

            <!-- ================= VIEW: แจ้งซ่อม (Update/Report) ================= -->
            <div id="view-update" class="view-section hidden max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-200">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2"><i class="fas fa-clipboard-list text-blue-500 mr-2"></i>ฟอร์มแจ้งซ่อม / อัปเดตสถานะ</h2>
                
                <form id="update-form" onsubmit="submitUpdate(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">รหัสเครื่องจักร / Machine ID <span class="text-red-500">*</span></label>
                        <select id="form-machine-id" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                            <option value="">-- กรุณารอโหลดข้อมูล --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อัปเดตสถานะเครื่อง <span class="text-red-500">*</span></label>
                        <select id="form-status" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="🔴 แจ้งซ่อม / เครื่องเสีย">🔴 แจ้งซ่อม / เครื่องเสีย</option>
                            <option value="🟡 รอตรวจสอบ / ซ่อมบำรุง">🟡 รอตรวจสอบ / ซ่อมบำรุง</option>
                            <option value="🟢 พร้อมใช้งาน / ปกติ">🟢 พร้อมใช้งาน / ปกติ</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">อาการที่พบ (Issue)</label>
                        <textarea id="form-issue" rows="2" placeholder="เช่น มอเตอร์มีเสียงดัง, สายพานขาด (หากแค่เช็คระยะให้เว้นว่าง)" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">การแก้ไขเบื้องต้น (Action Taken)</label>
                        <input type="text" id="form-action" placeholder="เช่น เปลี่ยนลูกปืน (ถ้าพึ่งแจ้งให้เว้นว่าง)" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้แจ้ง / ช่าง (Reporter) <span class="text-red-500">*</span></label>
                        <input type="text" id="form-tech" required placeholder="ชื่อของคุณ" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition text-lg flex justify-center items-center">
                            <i class="fas fa-save mr-2"></i> บันทึกข้อมูล (Submit)
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <!-- ================= Modal ดูประวัติ ================= -->
    <div id="history-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                <h3 class="text-lg font-bold text-gray-800" id="modal-title">ประวัติการซ่อม</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div class="p-0 md:p-4 overflow-y-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 hidden md:table-header-group">
                        <tr>
                            <th class="py-2 px-3 text-sm font-semibold text-gray-600">วันที่</th>
                            <th class="py-2 px-3 text-sm font-semibold text-gray-600">อาการ</th>
                            <th class="py-2 px-3 text-sm font-semibold text-gray-600">การแก้ไข</th>
                            <th class="py-2 px-3 text-sm font-semibold text-gray-600">ผู้ทำ</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body" class="block md:table-row-group">
                        <!-- ข้อมูลประวัติจะแสดงที่นี่ -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ================= Print Area (สำหรับสติกเกอร์ QR Code) ================= -->
    <div id="print-area" class="hidden">
        <div class="label-box">
            <h2 class="text-xl font-bold mb-1">M-MAINTAIN</h2>
            <p class="text-sm border-b pb-2 mb-2">ระบบสแกนแจ้งซ่อม</p>
            <h1 class="text-3xl font-extrabold mb-1" id="print-id">M-000</h1>
            <p class="text-md mb-2 font-semibold" id="print-name">ชื่อเครื่อง</p>
            <p class="text-sm mb-4 bg-gray-200 inline-block px-2 rounded" id="print-location">สถานที่</p>
            
            <div class="flex justify-center mb-2">
                <img id="print-qr" src="" alt="QR Code" class="w-40 h-40 border border-gray-300 p-1">
            </div>
            <p class="text-xs">สแกนด้วยมือถือเพื่อแจ้งซ่อมทันที</p>
        </div>
    </div>

    <!-- ================= JavaScript ================= -->
    <script>
        // ==========================================
        // ⚠️ นำ URL ของ Web App จาก Google Apps Script (ที่ลงท้ายด้วย /exec) มาวางที่นี่
        // ==========================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxGqJlm1vikiVH56QPPV9kIEePhqOUgsOY43Mlg7ybZVrAZ6VzL_LwWhobjS0upR-Hb/exec"; 

        let globalHistory = [];
        let globalMachines = [];

        // ฟังก์ชันควบคุม Loading Spinner
        function showLoading(show, text="กำลังประมวลผล...") {
            document.getElementById('loading-text').innerText = text;
            if(show) document.getElementById('loading').classList.remove('hidden');
            else document.getElementById('loading').classList.add('hidden');
        }

        // ระบบเปลี่ยนหน้าต่าง (Navigation)
        function switchView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            
            document.querySelectorAll('aside nav button').forEach(el => {
                el.classList.remove('bg-blue-50', 'text-blue-700');
                el.classList.add('text-gray-600');
            });
            const activeMenu = document.getElementById(`menu-${viewName}`);
            if(activeMenu) {
                activeMenu.classList.add('bg-blue-50', 'text-blue-700');
                activeMenu.classList.remove('text-gray-600');
            }
        }

        // ฟังก์ชันดึงข้อมูลจาก Google Sheets ผ่าน GAS
        async function fetchData() {
            showLoading(true, "กำลังโหลดข้อมูลจากฐานข้อมูล...");
            try {
                if (GAS_URL === "ใส่_URL_ของ_GAS_ที่นี่") {
                    console.log("ใช้ข้อมูลจำลองเนื่องจากยังไม่ได้ใส่ GAS_URL");
                    processData(getMockData());
                    return;
                }
                const response = await fetch(GAS_URL);
                const data = await response.json();
                if (data.status === "success") {
                    processData(data);
                } else {
                    alert("เกิดข้อผิดพลาด: " + data.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            } finally {
                showLoading(false);
            }
        }

        // ประมวลผลและแจกจ่ายข้อมูลไปยังส่วนต่างๆ ของเว็บ
        function processData(data) {
            globalMachines = data.machines;
            globalHistory = data.history;
            renderCards(globalMachines);
            populateDropdown(globalMachines);
            checkUrlParams(); 
        }

        // เลือกสีสถานะ (เขียว, เหลือง, แดง)
        function getStatusDotColor(statusStr) {
            if (!statusStr) return "bg-gray-400";
            if (statusStr.includes("พร้อม") || statusStr.includes("ปกติ") || statusStr.includes("🟢")) return "bg-green-500 shadow-green-300";
            if (statusStr.includes("รอ") || statusStr.includes("ตรวจสอบ") || statusStr.includes("🟡")) return "bg-yellow-400 shadow-yellow-200";
            if (statusStr.includes("ซ่อม") || statusStr.includes("เสีย") || statusStr.includes("🔴")) return "bg-red-500 shadow-red-300";
            return "bg-gray-400";
        }

        // สร้างการ์ดแสดงผล
        function renderCards(machines) {
            const grid = document.getElementById('machine-grid');
            grid.innerHTML = "";

            machines.forEach(machine => {
                const dotColor = getStatusDotColor(machine.Status);
                const cleanStatus = machine.Status ? machine.Status.replace(/[🟢🔴🟡]/g, '').trim() : "ไม่มีข้อมูล";

                const cardHTML = `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden relative group hover:shadow-md transition">
                        
                        <!-- เมนูมุมขวาบน (พิมพ์ QR & ดูประวัติ) -->
                        <div class="absolute top-2 right-2 z-10 flex flex-col gap-1">
                            <button onclick="printQR('${machine.Machine_ID}', '${machine.Name}', '${machine.Location}')" class="bg-white bg-opacity-90 text-gray-700 rounded p-2 shadow-sm hover:bg-gray-100 transition border" title="พิมพ์สติกเกอร์ QR">
                                <i class="fas fa-print"></i>
                            </button>
                            <button onclick="openModal('${machine.Machine_ID}')" class="bg-white bg-opacity-90 text-blue-600 rounded p-2 shadow-sm hover:bg-blue-50 transition border" title="ประวัติการซ่อม">
                                <i class="fas fa-history"></i>
                            </button>
                        </div>
                        
                        <!-- พื้นที่จำลองรูปภาพ -->
                        <div class="h-32 bg-slate-100 flex flex-col items-center justify-center text-slate-300 relative border-b border-gray-100">
                            <i class="fas fa-cogs text-4xl mb-1"></i>
                        </div>

                        <!-- รายละเอียดการ์ด -->
                        <div class="p-4 relative">
                            <div class="flex justify-between items-start mb-2 pr-8">
                                <div>
                                    <h3 class="font-bold text-xl text-gray-800">${machine.Machine_ID}</h3>
                                    <p class="text-sm font-medium text-gray-600 truncate w-40">${machine.Name}</p>
                                    <p class="text-xs text-gray-500 mt-1"><i class="fas fa-map-marker-alt text-red-400 mr-1"></i> ${machine.Location || 'ไม่ระบุ'}</p>
                                </div>
                                <div class="flex items-center absolute right-4 top-4">
                                    <div class="w-4 h-4 rounded-full ${dotColor} shadow-md border-2 border-white"></div>
                                </div>
                            </div>
                            
                            <div class="mt-3 pt-3 border-t border-gray-100 flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-gray-400 mb-0.5">สถานะปัจจุบัน</p>
                                    <p class="text-sm font-semibold text-gray-700">${cleanStatus}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-gray-400">อัปเดตล่าสุด</p>
                                    <p class="text-xs text-gray-500">${machine.Last_Update}</p>
                                </div>
                            </div>
                            
                            <button onclick="jumpToUpdate('${machine.Machine_ID}')" class="w-full mt-3 bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-600 text-sm py-1.5 rounded transition">
                                แจ้งซ่อม / อัปเดตเครื่องนี้
                            </button>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // นำรายชื่อเครื่องจักรเข้า Dropdown ในฟอร์มแจ้งซ่อม
        function populateDropdown(machines) {
            const select = document.getElementById('form-machine-id');
            select.innerHTML = `<option value="">-- เลือกหมายเลขเครื่องจักร --</option>`;
            machines.forEach(m => {
                select.innerHTML += `<option value="${m.Machine_ID}">${m.Machine_ID} : ${m.Name}</option>`;
            });
        }

        // ================= ฟังก์ชันส่งฟอร์มแจ้งซ่อม =================
        async function submitUpdate(e) {
            e.preventDefault(); 
            if (GAS_URL === "ใส่_URL_ของ_GAS_ที่นี่") {
                alert("ต้องเชื่อมต่อ GAS URL ก่อนถึงจะบันทึกข้อมูลได้จริงครับ");
                return;
            }

            const payload = {
                action: "update",
                Machine_ID: document.getElementById('form-machine-id').value,
                Status: document.getElementById('form-status').value,
                Issue: document.getElementById('form-issue').value,
                Action_Taken: document.getElementById('form-action').value,
                Technician: document.getElementById('form-tech').value
            };

            showLoading(true, "กำลังบันทึกข้อมูลและส่งแจ้งเตือน...");

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    alert("บันทึกข้อมูลสำเร็จ!");
                    document.getElementById('update-form').reset();
                    fetchData(); 
                    switchView('overview'); 
                } else {
                    alert("เกิดข้อผิดพลาด: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("บันทึกไม่สำเร็จ ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
            } finally {
                showLoading(false);
            }
        }

        // ================= ฟังก์ชันพิมพ์ QR Code =================
        function printQR(id, name, location) {
            const baseUrl = window.location.href.split('?')[0]; 
            const scanUrl = `${baseUrl}?scan=${id}`; 
            
            // สร้าง QR Code จาก API ฟรี
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(scanUrl)}`;

            document.getElementById('print-id').innerText = id;
            document.getElementById('print-name').innerText = name;
            document.getElementById('print-location').innerText = location;
            document.getElementById('print-qr').src = qrApiUrl;

            document.getElementById('print-qr').onload = function() {
                window.print();
            }
        }

        // ================= สแกน QR แล้วเปิดหน้าแจ้งซ่อมให้อัตโนมัติ =================
        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const scanId = urlParams.get('scan');
            if (scanId) {
                jumpToUpdate(scanId);
            }
        }

        function jumpToUpdate(id) {
            switchView('update');
            document.getElementById('form-machine-id').value = id;
            document.getElementById('form-status').value = "🔴 แจ้งซ่อม / เครื่องเสีย"; 
        }

        // ================= ฟังก์ชัน Modal ดูประวัติ =================
        function openModal(machineId) {
            document.getElementById('modal-title').innerText = `ประวัติ: ${machineId}`;
            const tbody = document.getElementById('modal-body');
            tbody.innerHTML = "";
            const history = globalHistory.filter(h => h.Machine_ID === machineId);

            if (history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-6 text-gray-500">ยังไม่มีประวัติการซ่อม</td></tr>`;
            } else {
                // จัดเรียงใหม่ล่าสุดขึ้นก่อน
                history.reverse().forEach(item => {
                    tbody.innerHTML += `
                        <tr class="block md:table-row border-b md:border-none mb-4 md:mb-0 bg-white md:bg-transparent shadow-sm md:shadow-none p-3 rounded-lg md:hover:bg-gray-50">
                            <td class="block md:table-cell py-1 md:py-3 px-2 md:px-3 text-sm text-gray-500 md:text-gray-700 md:border-b"><span class="font-bold md:hidden">วันที่: </span>${item.Timestamp.substring(0, 16)}</td>
                            <td class="block md:table-cell py-1 md:py-3 px-2 md:px-3 text-sm md:border-b"><span class="font-bold md:hidden">อาการ: </span>${item.Issue}</td>
                            <td class="block md:table-cell py-1 md:py-3 px-2 md:px-3 text-sm md:border-b text-blue-600"><span class="font-bold md:hidden text-gray-800">แก้ไข: </span>${item.Action_Taken}</td>
                            <td class="block md:table-cell py-1 md:py-3 px-2 md:px-3 text-sm md:border-b"><span class="font-bold md:hidden">ผู้ทำ: </span><i class="fas fa-user-circle text-gray-400 mr-1"></i>${item.Technician}</td>
                        </tr>
                    `;
                });
            }
            document.getElementById('history-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('history-modal').classList.add('hidden'); }
