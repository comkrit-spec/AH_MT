<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบแสดงสถานะเครื่องจักร</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ FontAwesome สำหรับไอคอน -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ฟอนต์ภาษาไทย */
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; }
        
        /* Loading Spinner */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- Sidebar (เมนูด้านซ้ายตามแบบร่าง) -->
    <aside class="w-64 bg-white shadow-lg flex flex-col justify-between hidden md:flex h-full z-10">
        <div>
            <!-- Logo -->
            <div class="h-20 flex items-center justify-center border-b border-gray-200">
                <h1 class="text-3xl font-bold text-blue-600 italic">LOGO</h1>
            </div>
            <!-- Navigation -->
            <nav class="p-4 space-y-2">
                <a href="#" class="block px-4 py-3 bg-blue-50 text-blue-700 rounded-lg font-medium">
                    <i class="fas fa-th-large mr-2"></i> ภาพรวม
                </a>
                <a href="#" class="block px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium">
                    <i class="fas fa-tools mr-2"></i> ซ่อมบำรุง
                </a>
                <a href="#" class="block px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium">
                    <i class="fas fa-edit mr-2"></i> อัพเดทสถานะ
                </a>
                <a href="#" class="block px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium">
                    <i class="fas fa-chart-bar mr-2"></i> Report รายงาน
                </a>
            </nav>
        </div>
        
        <!-- Bottom Settings & Profile -->
        <div class="p-4 border-t border-gray-200">
            <a href="#" class="block px-4 py-2 text-gray-600 hover:text-gray-900 mb-2">
                <i class="fas fa-cog mr-2"></i> การตั้งค่า
            </a>
            <div class="px-4 py-3 bg-gray-50 rounded-lg mb-3">
                <p class="text-sm text-gray-500">Login</p>
                <p class="font-semibold text-gray-800">นายสมชาย ช่างยนต์</p>
            </div>
            <button class="w-full border border-red-500 text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg font-medium transition-colors">
                Logout
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative">
        <!-- Header (สำหรับมือถือ) -->
        <header class="md:hidden bg-white shadow p-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600 italic">LOGO</h1>
            <button class="text-gray-600"><i class="fas fa-bars text-2xl"></i></button>
        </header>

        <!-- Content Area -->
        <div class="p-6 overflow-y-auto flex-1">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">สถานะเครื่องจักร (ภาพรวม)</h2>
                <button onclick="fetchData()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded shadow">
                    <i class="fas fa-sync-alt mr-2"></i>รีเฟรชข้อมูล
                </button>
            </div>

            <!-- Loading State -->
            <div id="loading" class="flex flex-col items-center justify-center py-20">
                <div class="loader mb-4"></div>
                <p class="text-gray-500">กำลังโหลดข้อมูลจาก Google Sheets...</p>
            </div>

            <!-- Grid สำหรับใส่ Card (ตามแบบร่าง) -->
            <div id="machine-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
                <!-- ข้อมูลจะถูกสร้างที่นี่ด้วย JavaScript -->
            </div>
        </div>
    </main>

    <!-- Modal สำหรับดูประวัติ (Pop-up) -->
    <div id="history-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-11/12 max-w-2xl max-h-[90vh] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                <h3 class="text-lg font-bold" id="modal-title">ประวัติการซ่อม: เครื่อง...</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-1">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b">
                            <th class="py-2 px-3">วันที่</th>
                            <th class="py-2 px-3">อาการ</th>
                            <th class="py-2 px-3">การแก้ไข</th>
                            <th class="py-2 px-3">ช่าง</th>
                        </tr>
                    </thead>
                    <tbody id="modal-body">
                        <!-- ข้อมูลประวัติจะแสดงที่นี่ -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚠️ นำ URL ของ Web App จาก Google Apps Script มาวางที่นี่
        // ==========================================
        const GAS_URL = "ใส่_URL_ของ_GAS_ที่นี่"; 

        let globalHistory = [];

        // ฟังก์ชันกำหนดสีของจุดสถานะตามแบบร่าง (เขียว/เหลือง/แดง)
        function getStatusDotColor(statusStr) {
            if (!statusStr) return "bg-gray-400";
            if (statusStr.includes("พร้อม") || statusStr.includes("ปกติ") || statusStr.includes("🟢")) return "bg-green-500 shadow-green-300";
            if (statusStr.includes("รอ") || statusStr.includes("ตรวจสอบ") || statusStr.includes("🟡")) return "bg-yellow-400 shadow-yellow-200";
            if (statusStr.includes("ซ่อม") || statusStr.includes("เสีย") || statusStr.includes("🔴")) return "bg-red-500 shadow-red-300";
            return "bg-gray-400";
        }

        async function fetchData() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('machine-grid').classList.add('hidden');
            
            try {
                // หากยังไม่ได้ใส่ GAS_URL ให้ใช้ข้อมูลจำลอง (Mock Data) ไปก่อนเพื่อดู UI
                if (GAS_URL === "ใส่_URL_ของ_GAS_ที่นี่") {
                    console.log("Using Mock Data since GAS_URL is not set.");
                    renderCards(getMockData().machines);
                    globalHistory = getMockData().history;
                    return;
                }

                const response = await fetch(GAS_URL);
                const data = await response.json();
                
                if (data.status === "success") {
                    globalHistory = data.history;
                    renderCards(data.machines);
                } else {
                    alert("เกิดข้อผิดพลาด: " + data.message);
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                alert("ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            } finally {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('machine-grid').classList.remove('hidden');
            }
        }

        function renderCards(machines) {
            const grid = document.getElementById('machine-grid');
            grid.innerHTML = "";

            machines.forEach(machine => {
                const dotColor = getStatusDotColor(machine.Status);
                // ตัด Emoji ออกจากสถานะเพื่อให้ข้อความดูเป็นทางการ
                const cleanStatus = machine.Status ? machine.Status.replace(/[🟢🔴🟡]/g, '').trim() : "N/A";

                const cardHTML = `
                    <div class="bg-white rounded-xl shadow border border-gray-200 overflow-hidden relative group">
                        <!-- ปุ่มรายละเอียดเครื่อง (Top Right มุมขวาบนตามแบบร่าง) -->
                        <button onclick="openModal('${machine.Machine_ID}')" class="absolute top-2 right-2 z-10 bg-white bg-opacity-90 text-blue-600 rounded p-2 shadow hover:bg-blue-50 transition" title="รายละเอียด/ประวัติ">
                            <i class="fas fa-file-alt"></i>
                        </button>
                        
                        <!-- พื้นที่รูปภาพ (Image Placeholder) -->
                        <div class="h-40 bg-gray-200 flex flex-col items-center justify-center text-gray-400 relative">
                            <i class="fas fa-cogs text-4xl mb-2"></i>
                            <span class="text-sm">รูปภาพเครื่อง</span>
                        </div>

                        <!-- เนื้อหาการ์ด -->
                        <div class="p-4 relative">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="font-bold text-xl text-gray-800">${machine.Machine_ID}</h3>
                                    <p class="text-sm text-gray-500">${machine.Name}</p>
                                </div>
                                <!-- จุดสถานะ (Status Dot ตามแบบร่าง) -->
                                <div class="flex items-center gap-2 mt-1">
                                    <div class="w-4 h-4 rounded-full ${dotColor} shadow-md border-2 border-white"></div>
                                </div>
                            </div>
                            
                            <div class="mt-4 pt-3 border-t border-gray-100 flex justify-between items-end">
                                <div>
                                    <p class="text-xs text-gray-500 mb-1">สถานะ</p>
                                    <p class="font-semibold text-gray-700">${cleanStatus}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-gray-400">อัพเดทล่าสุด</p>
                                    <p class="text-xs text-gray-500">${machine.Last_Update}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // ฟังก์ชันเปิด Modal ดูประวัติ
        function openModal(machineId) {
            document.getElementById('modal-title').innerText = `ประวัติการทำงาน: ${machineId}`;
            const tbody = document.getElementById('modal-body');
            tbody.innerHTML = "";

            const history = globalHistory.filter(h => h.Machine_ID === machineId);

            if (history.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-4 text-gray-500">ไม่มีประวัติการซ่อม</td></tr>`;
            } else {
                history.forEach(item => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-gray-50">
                            <td class="py-2 px-3 text-sm">${item.Timestamp.substring(0, 10)}</td>
                            <td class="py-2 px-3 text-sm">${item.Issue}</td>
                            <td class="py-2 px-3 text-sm">${item.Action_Taken}</td>
                            <td class="py-2 px-3 text-sm">${item.Technician}</td>
                        </tr>
                    `;
                });
            }

            document.getElementById('history-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('history-modal').classList.add('hidden');
        }

        // ข้อมูลจำลอง (Mock Data) สำหรับทดสอบ UI กรณีที่ยังไม่ได้เชื่อม GAS
        function getMockData() {
            return {
                machines: [
                    { Machine_ID: "AH35", Name: "เครื่องปั๊มโลหะ A", Location: "โซน 1", Status: "🟢 ปกติ", Last_Update: "23/07/2026 08:00" },
                    { Machine_ID: "M-002", Name: "สายพาน 1", Location: "โซน B2", Status: "🔴 แจ้งซ่อม", Last_Update: "22/07/2026 15:30" },
                    { Machine_ID: "M-003", Name: "มอเตอร์ปั๊มน้ำ", Location: "Utilities", Status: "🟡 รอตรวจสอบ", Last_Update: "20/07/2026 09:15" },
                    { Machine_ID: "M-004", Name: "เครื่องแพ็คกิ้ง", Location: "โซน 2", Status: "🟢 ปกติ", Last_Update: "21/07/2026 11:00" }
                ],
                history: [
                    { Timestamp: "22/07/2026 15:30", Machine_ID: "M-002", Issue: "สายพานฉีกขาด", Action_Taken: "-", Technician: "สมชาย" },
                    { Timestamp: "15/07/2026 10:00", Machine_ID: "AH35", Issue: "เช็คระยะ", Action_Taken: "ทำความสะอาด", Technician: "เอก" }
                ]
            };
        }

        // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
        window.onload = fetchData;
    </script>
</body>
</html>
